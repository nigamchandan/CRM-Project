<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Modern CRM brand mark.
    Rounded square (R = 16) with diagonal violet ’ indigo gradient,
    overlaid with a soft top-light highlight and a stroked open-ring "C".
    Designed at 64×64 so the favicon stays crisp at 16, 32 and 48.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="64" height="32" rx="16" fill="url(#hl)"/>
  <path d="M44 22.5 A 13.5 13.5 0 1 0 44 41.5"
        fill="none"
        stroke="#ffffff"
        stroke-width="5.25"
        stroke-linecap="round"/>
</svg>
