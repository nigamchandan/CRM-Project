name: Build & Deploy (Docker → EC2)

# Triggered on push to main, plus manual run.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  #  1) Build & push images to GHCR (one job for server, one for client)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: crm-server
            context: ./server
          - name: crm-client
            context: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image owner (GHCR requires lowercase)
        id: vars
        run: echo "owner_lc=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.component.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/${{ matrix.component.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/${{ matrix.component.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}

  # ---------------------------------------------------------------------------
  #  2) SSH into EC2 → docker compose pull && up -d
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          # EC2_SSH_KEY is a base64-encoded private key (no newlines).
          # `base64 -d` falls through to plain text if the secret was pasted as raw key.
          KEY_RAW='${{ secrets.EC2_SSH_KEY }}'
          if printf '%s' "$KEY_RAW" | base64 -d >/tmp/keytest 2>/dev/null && grep -q 'PRIVATE KEY' /tmp/keytest; then
            printf '%s' "$KEY_RAW" | base64 -d > ~/.ssh/id_ed25519
          else
            printf '%s\n' "$KEY_RAW" > ~/.ssh/id_ed25519
          fi
          rm -f /tmp/keytest
          # Strip CRLF if any
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Sanity check the key parses
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Lowercase owner
        id: vars
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2
        env:
          GHCR_OWNER: ${{ steps.vars.outputs.owner_lc }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "GHCR_OWNER='${GHCR_OWNER}' IMAGE_TAG='${IMAGE_TAG}' bash -se" <<'REMOTE'
          set -euo pipefail

          APP_DIR="$HOME/crm"
          cd "$APP_DIR"

          # Pull latest compose file + .env (preserved on disk; we only update compose)
          curl -fsSL -o docker-compose.prod.yml \
            "https://raw.githubusercontent.com/${GITHUB_REPOSITORY:-nigamchandan/CRM-Project}/main/docker-compose.prod.yml" \
            2>/dev/null || true

          # Persist the rolled-out tag so docker compose can resolve ${IMAGE_TAG}
          # (.env on EC2 already has DB creds, JWT secret, etc.)
          if grep -q '^IMAGE_TAG=' .env 2>/dev/null; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
          else
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
          fi
          if grep -q '^GHCR_OWNER=' .env 2>/dev/null; then
            sed -i "s/^GHCR_OWNER=.*/GHCR_OWNER=${GHCR_OWNER}/" .env
          else
            echo "GHCR_OWNER=${GHCR_OWNER}" >> .env
          fi

          echo "==> Pulling images @ ${IMAGE_TAG}"
          docker compose -f docker-compose.prod.yml pull

          echo "==> Restarting stack"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          echo "==> Pruning old images"
          docker image prune -f >/dev/null

          echo "==> Status"
          docker compose -f docker-compose.prod.yml ps
          REMOTE
