# =============================================================================
#  Production stack — meant to live on the EC2 instance.
#  Pulls pre-built images from GitHub Container Registry (built by CI).
#
#  Required: a sibling `.env` file with DB creds, JWT secret, GHCR_OWNER, etc.
#
#  First-time setup on EC2:
#    cp .env.example .env && nano .env
#    docker login ghcr.io          # if your GHCR package is private
#    RUN_DB_SEED=true docker compose -f docker-compose.prod.yml up -d
#    # then set RUN_DB_SEED=false in .env
#
#  Manual deploy / restart:
#    docker compose -f docker-compose.prod.yml pull
#    docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  crm-db:
    image: postgres:15-alpine
    container_name: crm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - crm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [crm-net]

  crm-server:
    image: ghcr.io/${GHCR_OWNER}/crm-server:${IMAGE_TAG:-latest}
    container_name: crm-server
    restart: unless-stopped
    depends_on:
      crm-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: crm-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL}
      UPLOAD_DIR: uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-CRM Support <no-reply@crm.test>}
    volumes:
      - crm_uploads:/app/uploads
    networks: [crm-net]

  crm-client:
    image: ghcr.io/${GHCR_OWNER}/crm-client:${IMAGE_TAG:-latest}
    container_name: crm-client
    restart: unless-stopped
    depends_on:
      - crm-server
    ports:
      - "${HOST_HTTP_PORT:-80}:8080"
    networks: [crm-net]

volumes:
  crm_db_data:
  crm_uploads:

networks:
  crm-net:
    driver: bridge
